<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mblok · Склад</title>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0d;
  --surface:#181815;
  --surface2:#202020;
  --border:#2a2a26;
  --border2:#383834;
  --text:#f0ede8;
  --muted:#7a7870;
  --muted2:#4a4845;
  --green:#4ade80;
  --green-dim:#1a3d25;
  --green-mid:#22c55e;
  --amber:#fbbf24;
  --amber-dim:#3d2f0a;
  --red:#f87171;
  --red-dim:#3d1515;
  --blue:#60a5fa;
  --blue-dim:#1a2a3d;
  --accent:#4ade80;
  --r:10px;--r-sm:6px;
}
body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* HEADER */
.header{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:600;letter-spacing:-0.5px;color:var(--text)}
.logo span{color:var(--green)}
.header-mid{flex:1;display:flex;align-items:center;gap:10px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:0 12px;height:34px;flex:1;max-width:360px}
.search-box svg{width:14px;height:14px;color:var(--muted);flex-shrink:0}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;width:100%}
.search-box input::placeholder{color:var(--muted)}
.header-right{display:flex;gap:8px;align-items:center}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background 0.3s}
.sync-dot.syncing{background:var(--amber);animation:pulse 0.8s ease-in-out infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{border-color:var(--border2);background:var(--surface);color:var(--text)}
.btn:active{transform:scale(0.97)}
.btn svg{width:13px;height:13px}
.btn-primary{background:var(--green);color:#0a1a0f;border-color:var(--green);font-weight:600}
.btn-primary:hover{background:var(--green-mid);border-color:var(--green-mid);color:#0a1a0f}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-danger{background:var(--red-dim);border-color:#5a2020;color:var(--red)}
.btn-danger:hover{background:#4a1a1a}

/* MAIN */
.main{padding:20px 24px;max-width:1500px;margin:0 auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.stat-val{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text)}
.stat-val.g{color:var(--green)}
.stat-val.a{color:var(--amber)}
.stat-val.r{color:var(--red)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px;width:fit-content}
.tab{height:30px;padding:0 16px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.15s;font-weight:500}
.tab.active{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}
.tab:hover:not(.active){color:var(--text)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{height:28px;padding:0 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.chip.active-amber{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.chip.active-red{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.ml-auto{margin-left:auto}

/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:10px 12px;text-align:left;font-weight:500;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;cursor:pointer;user-select:none;background:var(--surface)}
th:hover{color:var(--text)}
th.sort-asc::after{content:' ↑';color:var(--green)}
th.sort-desc::after{content:' ↓';color:var(--green)}
th.r,td.r{text-align:right}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
tr.editing td{background:rgba(74,222,128,0.04)}

/* INLINE EDIT */
.cell-view{cursor:pointer;border-radius:4px;padding:2px 4px;margin:-2px -4px;transition:background 0.15s}
.cell-view:hover{background:var(--surface2)}
.cell-input{width:100%;background:var(--surface2);border:1px solid var(--green);border-radius:4px;padding:3px 7px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.cell-input:focus{border-color:var(--green)}

/* PHOTO */
.td-photo{width:46px}
.product-img{width:38px;height:38px;border-radius:6px;object-fit:cover;border:1px solid var(--border);cursor:pointer}
.product-img-placeholder{width:38px;height:38px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}

/* NAME */
.td-name{min-width:200px}
.p-name{font-weight:500;margin-bottom:2px}
.p-art{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

/* QTY BADGE */
.qty{display:inline-flex;align-items:center;justify-content:center;min-width:36px;padding:3px 8px;border-radius:20px;font-weight:600;font-size:12px;font-family:'JetBrains Mono',monospace}
.qty-zero{background:var(--red-dim);color:var(--red);border:1px solid #4a2020}
.qty-low{background:var(--amber-dim);color:var(--amber);border:1px solid #4a3010}
.qty-ok{background:var(--green-dim);color:var(--green);border:1px solid #1a4a25}

/* PRICE */
.price{font-family:'JetBrains Mono',monospace;font-size:12px}
.price-buy{color:var(--muted)}
.price-sell{color:var(--text);font-weight:500}
.total-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--text)}

/* ROW ACTIONS */
.row-acts{display:flex;gap:4px;justify-content:flex-end;opacity:0;transition:opacity 0.15s}
tr:hover .row-acts{opacity:1}
tr.editing .row-acts{opacity:1}

/* FOOTER ROW */
.tbl-footer{background:var(--surface2);border-top:1px solid var(--border2)}
.tbl-footer td{font-weight:600;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);padding:10px 12px}
.tbl-footer td.total-sum{color:var(--green);font-size:13px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-hdr{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600}
.modal-x{background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;padding:0}
.modal-x:hover{color:var(--text)}
.modal-body{padding:20px}
.modal-footer{padding:0 20px 20px;display:flex;gap:8px;justify-content:flex-end}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px}
input[type=text],input[type=number],select{width:100%;height:36px;padding:0 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border 0.15s}
input:focus,select:focus{border-color:var(--green)}
select option{background:var(--surface2)}
.photo-drop{border:1px dashed var(--border2);border-radius:var(--r-sm);height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s;margin-top:6px;overflow:hidden;position:relative}
.photo-drop:hover{border-color:var(--green);color:var(--green)}
.photo-drop img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.photo-drop input{display:none}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 16px;border-radius:var(--r-sm);font-size:13px;z-index:999;opacity:0;transform:translateY(6px);transition:all 0.2s;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:var(--muted);font-size:13px}
.spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px;color:var(--muted);font-size:13px}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:24px;max-width:360px;width:90%;text-align:center}
.confirm-box p{margin-bottom:20px;color:var(--muted);font-size:13px}
.confirm-box strong{display:block;margin-bottom:6px;font-size:15px;color:var(--text)}
.confirm-actions{display:flex;gap:8px;justify-content:center}
</style>
</head>
<body>

<header class="header">
  <div class="logo">mb<span>lok</span> · склад</div>
  <div class="header-mid">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Пошук товару або артикулу...">
    </div>
  </div>
  <div class="header-right">
    <div class="sync-dot" id="syncDot" title="Статус синхронізації"></div>
    <button class="btn btn-primary" onclick="openModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Додати товар
    </button>
  </div>
</header>

<main class="main">
  <div class="stats" id="statsBar"></div>

  <div class="tabs">
    <button class="tab active" data-tab="1" onclick="switchTab(1)">📦 Склад №1 Продаж</button>
    <button class="tab" data-tab="2" onclick="switchTab(2)">🏭 Склад №2 Резерв</button>
    <button class="tab" data-tab="0" onclick="switchTab(0)">🔍 Всі товари</button>
  </div>

  <div class="toolbar">
    <div class="filter-chips" id="filterChips">
      <button class="chip active" data-f="all" onclick="setFilter('all',this)">Всі</button>
      <button class="chip" data-f="low" onclick="setFilter('low',this)">⚠ Мало (≤5)</button>
      <button class="chip" data-f="zero" onclick="setFilter('zero',this)">✕ Нульові</button>
    </div>
    <div class="ml-auto" style="display:flex;gap:8px">
      <select id="sortSelect" onchange="renderTable()" style="height:30px;font-size:12px;padding:0 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--muted);font-family:inherit">
        <option value="name">За назвою</option>
        <option value="qty">За кількістю</option>
        <option value="price_buy">За ціною закупки</option>
        <option value="price_sell">За ціною продажу</option>
        <option value="total">За сумою</option>
      </select>
    </div>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th style="width:46px"></th>
            <th>Назва / Артикул</th>
            <th>Склад</th>
            <th class="r">К-сть</th>
            <th class="r">Ціна закупки</th>
            <th class="r">Ціна продажу</th>
            <th class="r">Сума</th>
            <th style="width:90px"></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="8"><div class="loading"><div class="spin"></div>Підключення до бази...</div></td></tr>
        </tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>
</main>

<!-- MODAL ДОДАТИ/РЕДАГУВАТИ -->
<div class="overlay" id="overlay" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">Новий товар</div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Назва товару</label>
        <input type="text" id="fName" placeholder="Конструктор Lamborghini...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Артикул</label>
          <input type="text" id="fArt" placeholder="LB-001">
        </div>
        <div class="form-group">
          <label>Склад</label>
          <select id="fWarehouse">
            <option value="1">Склад №1 Продаж</option>
            <option value="2">Склад №2 Резерв</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Ціна закупки (грн)</label>
          <input type="number" id="fPriceBuy" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>Ціна продажу (грн)</label>
          <input type="number" id="fPriceSell" placeholder="0.00" step="0.01" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>Кількість</label>
        <input type="number" id="fQty" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Фото (URL або завантаж)</label>
        <input type="text" id="fPhoto" placeholder="https://..." oninput="previewModalPhoto()">
        <div class="photo-drop" id="photoDropZone" onclick="document.getElementById('fPhotoFile').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
          <input type="file" id="fPhotoFile" accept="image/*" onchange="handleFile(this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Клікни або перетягни фото</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="deleteBtn" onclick="confirmDelete()" style="display:none;margin-right:auto">Видалити</button>
      <button class="btn btn-ghost" onclick="closeModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveItem()">Зберегти</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <strong id="confirmName"></strong>
    <p>Видалити цей товар? Дію не можна скасувати.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Скасувати</button>
      <button class="btn btn-danger" onclick="doDelete()">Видалити</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBWy6VhhuYFyUWBJ4vpaBFWaO6BWhc2G2E",
  authDomain: "mblok-sklad.firebaseapp.com",
  projectId: "mblok-sklad",
  storageBucket: "mblok-sklad.firebasestorage.app",
  messagingSenderId: "722772434015",
  appId: "1:722772434015:web:2a1818cab4fbe586d44fea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allItems = [];
let activeTab = 1;
let activeFilter = 'all';
let searchQ = '';
let sortBy = 'name';
let deleteTargetId = null;
let editingCell = null;

// ─── REALTIME SYNC ───────────────────────────────────────
setSyncStatus('syncing');
onSnapshot(collection(db, 'products'), snap => {
  allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  renderStats();
  renderTable();
  setSyncStatus('ok');
}, err => {
  console.error(err);
  setSyncStatus('error');
  toast('Помилка підключення', 'err');
});

function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
  dot.title = s === 'ok' ? 'Синхронізовано' : s === 'syncing' ? 'Синхронізація...' : 'Помилка';
}

// ─── SAVE / DELETE ────────────────────────────────────────
async function saveToDb(item) {
  setSyncStatus('syncing');
  try {
    const id = item.id || crypto.randomUUID();
    await setDoc(doc(db, 'products', id), {
      name: item.name || '',
      art: item.art || '',
      warehouse: Number(item.warehouse) || 1,
      qty: Number(item.qty) || 0,
      price_buy: Number(item.price_buy) || 0,
      price_sell: Number(item.price_sell) || 0,
      photo: item.photo || '',
      updated: serverTimestamp()
    });
    setSyncStatus('ok');
    return id;
  } catch(e) {
    setSyncStatus('error');
    toast('Помилка збереження', 'err');
    throw e;
  }
}

async function deleteFromDb(id) {
  setSyncStatus('syncing');
  try {
    await deleteDoc(doc(db, 'products', id));
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    toast('Помилка видалення', 'err');
  }
}

// ─── RENDER ───────────────────────────────────────────────
function getFiltered() {
  let d = [...allItems];
  if (activeTab === 1) d = d.filter(r => Number(r.warehouse) === 1);
  else if (activeTab === 2) d = d.filter(r => Number(r.warehouse) === 2);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    d = d.filter(r => (r.name||'').toLowerCase().includes(q) || (r.art||'').toLowerCase().includes(q));
  }
  if (activeFilter === 'low') d = d.filter(r => Number(r.qty) > 0 && Number(r.qty) <= 5);
  else if (activeFilter === 'zero') d = d.filter(r => !Number(r.qty));
  d.sort((a,b) => {
    if (sortBy === 'name') return (a.name||'').localeCompare(b.name||'','uk');
    if (sortBy === 'qty') return Number(b.qty)-Number(a.qty);
    if (sortBy === 'price_buy') return Number(b.price_buy)-Number(a.price_buy);
    if (sortBy === 'price_sell') return Number(b.price_sell)-Number(a.price_sell);
    if (sortBy === 'total') return (Number(b.qty)*Number(b.price_buy))-(Number(a.qty)*Number(a.price_buy));
    return 0;
  });
  return d;
}

function fmtMoney(n) {
  if (!n && n!==0) return '—';
  return '₴' + Number(n).toLocaleString('uk-UA',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtN(n) { return Number(n).toLocaleString('uk-UA'); }

function renderStats() {
  const s1 = allItems.filter(r=>Number(r.warehouse)===1);
  const s2 = allItems.filter(r=>Number(r.warehouse)===2);
  const tot1 = s1.reduce((a,r)=>a+Number(r.qty)*Number(r.price_buy),0);
  const tot2 = s2.reduce((a,r)=>a+Number(r.qty)*Number(r.price_buy),0);
  const zero = allItems.filter(r=>!Number(r.qty)).length;
  const low = allItems.filter(r=>Number(r.qty)>0&&Number(r.qty)<=5).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-label">Склад №1 (вартість)</div><div class="stat-val g">${fmtMoney(tot1)}</div></div>
    <div class="stat"><div class="stat-label">Склад №2 (вартість)</div><div class="stat-val g">${fmtMoney(tot2)}</div></div>
    <div class="stat"><div class="stat-label">Всього позицій</div><div class="stat-val">${allItems.length}</div></div>
    <div class="stat"><div class="stat-label">Мало залишків</div><div class="stat-val a">${low}</div></div>
    <div class="stat"><div class="stat-label">Нульові</div><div class="stat-val r">${zero}</div></div>
  `;
}

function renderTable() {
  const rows = getFiltered();
  const tbody = document.getElementById('tbody');
  const tfoot = document.getElementById('tfoot');

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty">Нічого не знайдено</div></td></tr>`;
    tfoot.innerHTML = '';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const qty = Number(r.qty)||0;
    const qc = qty===0?'qty-zero':qty<=5?'qty-low':'qty-ok';
    const total = qty*(Number(r.price_buy)||0);
    const wLabel = Number(r.warehouse)===1?'<span style="font-size:11px;color:var(--green)">№1</span>':'<span style="font-size:11px;color:var(--blue)">№2</span>';
    const photoEl = r.photo
      ? `<img class="product-img" src="${r.photo}" alt="" onerror="this.style.display='none'">`
      : `<div class="product-img-placeholder">📦</div>`;
    return `<tr id="row-${r.id}">
      <td class="td-photo" onclick="openModal('${r.id}')" style="cursor:pointer">${photoEl}</td>
      <td class="td-name">
        <div class="p-name cell-view" onclick="startEdit('${r.id}','name',this)">${escHtml(r.name||'—')}</div>
        <div class="p-art cell-view" onclick="startEdit('${r.id}','art',this)">${escHtml(r.art||'—')}</div>
      </td>
      <td>${wLabel}</td>
      <td class="r"><span class="qty ${qc} cell-view" onclick="startEdit('${r.id}','qty',this)">${fmtN(qty)}</span></td>
      <td class="r"><span class="price price-buy cell-view" onclick="startEdit('${r.id}','price_buy',this)">${fmtMoney(r.price_buy)}</span></td>
      <td class="r"><span class="price price-sell cell-view" onclick="startEdit('${r.id}','price_sell',this)">${fmtMoney(r.price_sell)}</span></td>
      <td class="r"><span class="total-val">${fmtMoney(total)}</span></td>
      <td>
        <div class="row-acts">
          <button class="btn btn-ghost" style="height:26px;padding:0 8px;font-size:11px" onclick="openModal('${r.id}')">✏️</button>
          <button class="btn btn-ghost" style="height:26px;padding:0 8px;font-size:11px" onclick="confirmDeleteItem('${r.id}','${escHtml(r.name||'')}')">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  const totBuy = rows.reduce((a,r)=>a+Number(r.qty)*Number(r.price_buy),0);
  const totSell = rows.reduce((a,r)=>a+Number(r.qty)*(Number(r.price_sell)||0),0);
  tfoot.innerHTML = `<tr class="tbl-footer">
    <td colspan="3">Разом: ${rows.length} поз.</td>
    <td class="r">${fmtN(rows.reduce((a,r)=>a+Number(r.qty),0))}</td>
    <td class="r total-sum">${fmtMoney(totBuy)}</td>
    <td class="r total-sum">${fmtMoney(totSell)}</td>
    <td class="r total-sum">${fmtMoney(totBuy)}</td>
    <td></td>
  </tr>`;
}

// ─── INLINE EDIT ──────────────────────────────────────────
window.startEdit = function(id, field, el) {
  if (editingCell) cancelEdit();
  editingCell = { id, field, el, orig: el.textContent.trim() };

  const item = allItems.find(r=>r.id===id);
  const val = item ? (item[field]??'') : '';
  const isNum = ['qty','price_buy','price_sell'].includes(field);

  const input = document.createElement('input');
  input.className = 'cell-input';
  input.type = isNum ? 'number' : 'text';
  input.value = val;
  input.step = isNum && field!=='qty' ? '0.01' : '1';
  input.min = isNum ? '0' : undefined;
  input.style.width = isNum ? '90px' : '100%';

  input.onkeydown = e => {
    if (e.key==='Enter') commitEdit(input, id, field);
    if (e.key==='Escape') cancelEdit();
    e.stopPropagation();
  };
  input.onblur = () => commitEdit(input, id, field);

  el.replaceWith(input);
  input.focus();
  input.select();

  const row = document.getElementById('row-'+id);
  if (row) row.classList.add('editing');
};

async function commitEdit(input, id, field) {
  if (!editingCell) return;
  editingCell = null;
  const item = allItems.find(r=>r.id===id);
  if (!item) return;
  const isNum = ['qty','price_buy','price_sell'].includes(field);
  const newVal = isNum ? (parseFloat(input.value)||0) : input.value.trim();
  item[field] = newVal;
  renderTable();
  await saveToDb(item);
  toast('Збережено', 'ok');
}

function cancelEdit() {
  if (!editingCell) return;
  editingCell = null;
  renderTable();
}

// ─── MODAL ────────────────────────────────────────────────
window.openModal = function(id) {
  const isEdit = !!id;
  document.getElementById('modalTitle').textContent = isEdit ? 'Редагувати товар' : 'Новий товар';
  document.getElementById('deleteBtn').style.display = isEdit ? 'inline-flex' : 'none';
  document.getElementById('editId').value = id || '';

  const r = isEdit ? allItems.find(x=>x.id===id) : {};
  document.getElementById('fName').value = r?.name||'';
  document.getElementById('fArt').value = r?.art||'';
  document.getElementById('fWarehouse').value = r?.warehouse||1;
  document.getElementById('fPriceBuy').value = r?.price_buy||'';
  document.getElementById('fPriceSell').value = r?.price_sell||'';
  document.getElementById('fQty').value = r?.qty||'';
  document.getElementById('fPhoto').value = r?.photo||'';
  previewModalPhotoVal(r?.photo||'');

  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),100);
};

window.closeModal = function() { document.getElementById('overlay').classList.remove('open'); };
window.closeModalOut = function(e) { if(e.target===document.getElementById('overlay')) closeModal(); };

window.previewModalPhoto = function() { previewModalPhotoVal(document.getElementById('fPhoto').value); };

function previewModalPhotoVal(url) {
  const dz = document.getElementById('photoDropZone');
  const existing = dz.querySelector('img');
  if (existing) existing.remove();
  if (url) {
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:6px';
    dz.appendChild(img);
  }
}

window.handleFile = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('fPhoto').value = e.target.result;
    previewModalPhotoVal(e.target.result);
  };
  reader.readAsDataURL(file);
};

window.handleDrop = function(e) {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file||!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('fPhoto').value = ev.target.result;
    previewModalPhotoVal(ev.target.result);
  };
  reader.readAsDataURL(file);
};

window.saveItem = async function() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('Введи назву', 'err'); return; }
  const id = document.getElementById('editId').value || undefined;
  const item = {
    id,
    name,
    art: document.getElementById('fArt').value.trim(),
    warehouse: Number(document.getElementById('fWarehouse').value),
    price_buy: parseFloat(document.getElementById('fPriceBuy').value)||0,
    price_sell: parseFloat(document.getElementById('fPriceSell').value)||0,
    qty: parseInt(document.getElementById('fQty').value)||0,
    photo: document.getElementById('fPhoto').value.trim(),
  };
  closeModal();
  await saveToDb(item);
  toast(id ? 'Оновлено' : 'Додано', 'ok');
};

// ─── DELETE ───────────────────────────────────────────────
window.confirmDelete = function() {
  const id = document.getElementById('editId').value;
  const item = allItems.find(r=>r.id===id);
  confirmDeleteItem(id, item?.name||'');
  closeModal();
};

window.confirmDeleteItem = function(id, name) {
  deleteTargetId = id;
  document.getElementById('confirmName').textContent = name;
  document.getElementById('confirmOverlay').classList.add('open');
};

window.closeConfirm = function() {
  document.getElementById('confirmOverlay').classList.remove('open');
  deleteTargetId = null;
};

window.doDelete = async function() {
  if (!deleteTargetId) return;
  const id = deleteTargetId;
  closeConfirm();
  await deleteFromDb(id);
  toast('Видалено', 'ok');
};

// ─── UI CONTROLS ──────────────────────────────────────────
window.switchTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', Number(t.dataset.tab)===tab));
  renderTable();
};

window.setFilter = function(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c=>c.className='chip');
  if (f==='all') btn.className='chip active';
  else if (f==='low') btn.className='chip active-amber';
  else btn.className='chip active-red';
  renderTable();
};

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value;
  renderTable();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortBy = e.target.value;
  renderTable();
});

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closeConfirm(); }
});

// ─── TOAST ────────────────────────────────────────────────
window.toast = function(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(t._to);
  t._to = setTimeout(()=>t.className='toast', 2500);
};

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
